<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login - JavaTube</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<nav class="navbar">
		<a href="/" class="navbar-brand">JavaTube</a>
		<div class="navbar-nav"></div>
	</nav>

	<div class="form-page">
		<h1>Login</h1>
		<form id="login-form">
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" placeholder="email@contoh.com" required>
			</div>
			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" placeholder="Masukkan password" required>
			</div>
			<div class="form-group" id="totp-group" style="display:none">
				<label for="totpCode">Kode 2FA</label>
				<input type="text" id="totpCode" placeholder="Masukkan 6 digit kode" maxlength="6" style="letter-spacing:4px;text-align:center;">
			</div>
			<button type="submit" class="btn btn-primary form-submit">Login</button>
		</form>
		<div class="form-footer">
			<a href="/forgot-password" style="color:var(--accent);">Lupa password?</a><br>
			Belum punya akun? <a href="/register">Daftar di sini</a>
		</div>
	</div>

	<script src="/js/app.js"></script>
	<script>
		if (isLoggedIn()) window.location.href = '/';

		document.getElementById('login-form').addEventListener('submit', async (e) => {
			e.preventDefault();
			const form = e.target;
			const btn = form.querySelector('button[type="submit"]');
			btn.disabled = true;
			btn.textContent = 'Memproses...';

			const { ok, data } = await api('/api/auth/login', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					email: document.getElementById('email').value,
					password: document.getElementById('password').value,
					totpCode: document.getElementById('totpCode').value || undefined,
				}),
			});

			if (ok && data.data?.requires2FA) {
				document.getElementById('totp-group').style.display = 'block';
				document.getElementById('totpCode').focus();
				showAlert(form.parentElement, 'Masukkan kode 2FA dari aplikasi authenticator', 'info');
				btn.disabled = false;
				btn.textContent = 'Login';
				return;
			}

			if (ok && data.data?.token) {
				setToken(data.data.token);
				setUser(data.data.user);
				window.location.href = '/';
			} else {
				const msg = data.errors?.auth?.[0] || data.message || 'Login gagal';
				showAlert(form.parentElement, msg);
				btn.disabled = false;
				btn.textContent = 'Login';
			}
		});
	</script>
</body>
</html>
