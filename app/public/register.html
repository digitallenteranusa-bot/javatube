<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register - GamanTube</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<nav class="navbar">
		<a href="/" class="navbar-brand">GamanTube</a>
		<div class="navbar-nav"></div>
	</nav>

	<div class="form-page">
		<h1>Daftar Akun</h1>
		<form id="register-form">
			<div class="form-group">
				<label for="username">Username</label>
				<input type="text" id="username" placeholder="Masukkan username" required>
			</div>
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" placeholder="email@contoh.com" required>
			</div>
			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" placeholder="Minimal 6 karakter" required minlength="6">
			</div>
			<button type="submit" class="btn btn-primary form-submit">Daftar</button>
		</form>
		<div class="form-footer">
			Sudah punya akun? <a href="/login">Login di sini</a>
		</div>
	</div>

	<script src="/js/app.js"></script>
	<script>
		if (isLoggedIn()) window.location.href = '/';

		document.getElementById('register-form').addEventListener('submit', async (e) => {
			e.preventDefault();
			const form = e.target;
			const btn = form.querySelector('button');
			btn.disabled = true;
			btn.textContent = 'Memproses...';

			const { ok, data } = await api('/api/auth/register', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					username: document.getElementById('username').value,
					email: document.getElementById('email').value,
					password: document.getElementById('password').value,
				}),
			});

			if (ok && data.data?.token) {
				setToken(data.data.token);
				setUser(data.data.user);
				window.location.href = '/';
			} else {
				const errors = data.errors || {};
				const msg = Object.values(errors).flat()[0] || data.message || 'Registrasi gagal';
				showAlert(form.parentElement, msg);
				btn.disabled = false;
				btn.textContent = 'Daftar';
			}
		});
	</script>
</body>
</html>
