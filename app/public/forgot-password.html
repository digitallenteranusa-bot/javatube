<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lupa Password - JavaTube</title>
	<link rel="stylesheet" href="/css/style.css">
	<style>
		.forgot-page { max-width:420px; margin:80px auto; padding:0 16px; }
		.forgot-card { background:var(--bg-secondary); border-radius:12px; padding:32px; }
		.forgot-card h1 { font-size:22px; margin-bottom:8px; }
		.forgot-card p { color:var(--text-secondary); font-size:14px; margin-bottom:20px; }
	</style>
</head>
<body>
	<nav class="navbar">
		<a href="/" class="navbar-brand">JavaTube</a>
		<div class="navbar-nav"></div>
	</nav>

	<div class="forgot-page">
		<div class="forgot-card" id="forgot-card">
			<h1>Lupa Password</h1>
			<p>Masukkan email kamu untuk menerima link reset password.</p>
			<form id="forgot-form" onsubmit="return handleForgot(event)">
				<div class="form-group" style="margin-bottom:16px;">
					<input type="email" id="email" placeholder="Email" required style="width:100%;padding:12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;">
				</div>
				<button type="submit" class="btn btn-primary" style="width:100%;" id="submit-btn">Kirim Link Reset</button>
			</form>
			<p style="margin-top:16px;text-align:center;"><a href="/login" style="color:var(--accent);">Kembali ke Login</a></p>
		</div>
	</div>

	<script src="/js/app.js"></script>
	<script>
		async function handleForgot(e) {
			e.preventDefault();
			const email = document.getElementById('email').value.trim();
			const btn = document.getElementById('submit-btn');
			btn.disabled = true;
			btn.textContent = 'Mengirim...';

			const { ok, data } = await api('/api/auth/forgot-password', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ email }),
			});

			const card = document.getElementById('forgot-card');
			card.innerHTML = '<h1>Email Terkirim</h1><p>Jika email terdaftar, link reset password telah dikirim ke inbox kamu. Cek juga folder spam.</p><a href="/login" class="btn btn-primary" style="margin-top:16px;display:inline-block;">Kembali ke Login</a>';
			return false;
		}
	</script>
</body>
</html>
