<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reset Password - JavaTube</title>
	<link rel="stylesheet" href="/css/style.css">
	<style>
		.reset-page { max-width:420px; margin:80px auto; padding:0 16px; }
		.reset-card { background:var(--bg-secondary); border-radius:12px; padding:32px; }
		.reset-card h1 { font-size:22px; margin-bottom:8px; }
		.reset-card p { color:var(--text-secondary); font-size:14px; margin-bottom:20px; }
	</style>
</head>
<body>
	<nav class="navbar">
		<a href="/" class="navbar-brand">JavaTube</a>
		<div class="navbar-nav"></div>
	</nav>

	<div class="reset-page">
		<div class="reset-card" id="reset-card">
			<h1>Reset Password</h1>
			<p>Masukkan password baru kamu.</p>
			<form id="reset-form" onsubmit="return handleReset(event)">
				<div class="form-group" style="margin-bottom:12px;">
					<input type="password" id="password" placeholder="Password baru (min 6 karakter)" required minlength="6" style="width:100%;padding:12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;">
				</div>
				<div class="form-group" style="margin-bottom:16px;">
					<input type="password" id="password2" placeholder="Konfirmasi password baru" required style="width:100%;padding:12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;">
				</div>
				<button type="submit" class="btn btn-primary" style="width:100%;" id="submit-btn">Reset Password</button>
			</form>
		</div>
	</div>

	<script src="/js/app.js"></script>
	<script>
		const params = new URLSearchParams(window.location.search);
		const token = params.get('token');
		if (!token) {
			document.getElementById('reset-card').innerHTML = '<h1>Link Tidak Valid</h1><p>Link reset password tidak valid.</p><a href="/forgot-password" class="btn btn-primary" style="margin-top:16px;display:inline-block;">Minta Link Baru</a>';
		}

		async function handleReset(e) {
			e.preventDefault();
			const password = document.getElementById('password').value;
			const password2 = document.getElementById('password2').value;

			if (password !== password2) {
				alert('Password tidak cocok');
				return false;
			}

			const btn = document.getElementById('submit-btn');
			btn.disabled = true;
			btn.textContent = 'Menyimpan...';

			const { ok, data } = await api('/api/auth/reset-password', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ token, password }),
			});

			const card = document.getElementById('reset-card');
			if (ok) {
				card.innerHTML = '<h1>Password Berhasil Direset</h1><p>Password kamu sudah berubah. Silakan login dengan password baru.</p><a href="/login" class="btn btn-primary" style="margin-top:16px;display:inline-block;">Login</a>';
			} else {
				btn.disabled = false;
				btn.textContent = 'Reset Password';
				alert(data.message || 'Gagal mereset password. Token mungkin sudah kadaluarsa.');
			}
			return false;
		}
	</script>
</body>
</html>
