# Nginx Reverse Proxy untuk GamanTube
# Letakkan file ini di: /etc/nginx/sites-available/gamantube
# Lalu symlink: ln -s /etc/nginx/sites-available/gamantube /etc/nginx/sites-enabled/

# Redirect HTTP ke HTTPS
server {
    listen 80;
    server_name contoh-domain.my.id;  # Ganti dengan domain kamu

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name contoh-domain.my.id;  # Ganti dengan domain kamu

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/contoh-domain.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/contoh-domain.my.id/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Max upload size (sesuaikan dengan maxRequestBodySize di app)
    client_max_body_size 500M;

    # Proxy ke GamanTube (Bun server)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout untuk upload video besar
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Cache static files
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Cache HLS segments
    location /stream/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
